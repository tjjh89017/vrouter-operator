---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: vroutertargets.vrouter.kojuro.date
spec:
  group: vrouter.kojuro.date
  names:
    kind: VRouterTarget
    listKind: VRouterTargetList
    plural: vroutertargets
    shortNames:
    - vrt
    - vroutertarget
    singular: vroutertarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.vmRunning
      name: VM Running
      type: boolean
    name: v1
    schema:
      openAPIV3Schema:
        description: VRouterTarget is the Schema for the vroutertargets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VRouterTargetSpec defines the desired state of VRouterTarget.
            properties:
              params:
                x-kubernetes-preserve-unknown-fields: true
              provider:
                description: ProviderConfig defines which virtualization backend to
                  use and the target router.
                properties:
                  daemon:
                    description: DaemonConfig holds vrouter-daemon ControlService
                      connection parameters.
                    properties:
                      address:
                        description: |-
                          Address is the gRPC endpoint of the vrouter-daemon ControlService
                          (e.g., "vrouter-server.default.svc:9090").
                        type: string
                      agentID:
                        description: AgentID is the identifier of the target router
                          agent.
                        type: string
                      timeoutSeconds:
                        default: 60
                        description: TimeoutSeconds is the maximum time to wait for
                          a config apply to complete.
                        format: int32
                        type: integer
                    required:
                    - address
                    - agentID
                    type: object
                  kubevirt:
                    description: KubeVirtConfig holds KubeVirt provider configuration
                      and router identification.
                    properties:
                      kubeconfig:
                        description: KubeconfigRef references a kubeconfig stored
                          in a Secret.
                        properties:
                          secretRef:
                            description: SecretKeyRef references a specific key in
                              a Secret.
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - secretRef
                        type: object
                      name:
                        description: Name of the VirtualMachine / VirtualMachineInstance.
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  proxmox:
                    description: ProxmoxConfig holds Proxmox VE provider configuration
                      and router identification.
                    properties:
                      clusterRef:
                        description: |-
                          ClusterRef references a ProxmoxCluster resource that holds endpoint and credentials.
                          Namespace may be omitted to use the same namespace as the VRouterTarget.
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                        required:
