---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - kubevirt.io
  resources:
  - virtualmachineinstances
  - virtualmachines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vrouter.kojuro.date
  resources:
  - vrouterbindings
  - vrouterconfigs
  - vroutertargets
  - vroutertemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vrouter.kojuro.date
  resources:
  - vrouterbindings/finalizers
  - vrouterconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - vrouter.kojuro.date
  resources:
  - vrouterbindings/status
  - vrouterconfigs/status
  verbs:
  - get
  - patch
  - update
