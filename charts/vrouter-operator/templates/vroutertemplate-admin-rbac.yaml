apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vrouter-operator.fullname" . }}-vroutertemplate-admin-role
  labels:
  {{- include "vrouter-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - vrouter.kojuro.date
  resources:
  - vroutertemplates
  verbs:
  - '*'
- apiGroups:
  - vrouter.kojuro.date
  resources:
  - vroutertemplates/status
  verbs:
  - get
