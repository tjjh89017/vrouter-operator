apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-metrics-service" (include "vrouter-operator.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    control-plane: controller-manager
  {{- include "vrouter-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  selector:
    control-plane: controller-manager
    {{- include "vrouter-operator.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.metricsService.ports | toYaml | nindent 2 }}
